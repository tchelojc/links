<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Conteúdo Blindado</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(circle at 20%30%,#0a0f1a,#030507);font-family:'Segoe UI','Courier New',monospace;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:rgba(10,20,30,.9);backdrop-filter:blur(14px);border-radius:32px;border:1px solid #0ff5;box-shadow:0 20px 48px #0009,0 0 24px #0ff3;padding:2rem;width:100%;max-width:500px;text-align:center}
.top-bar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem}
.title{font-size:1.2rem;background:linear-gradient(135deg,#0ff,#0f0);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:1px}
.countdown-info{font-size:.8rem;color:#4cc;display:flex;gap:.5rem;align-items:baseline}
.countdown-info .value{font-family:monospace;font-weight:bold;color:#0f0}
.countdown-info.urgente .value{color:#f55;animation:piscar 1s infinite}
@keyframes piscar{50%{opacity:.4}}
input[type=text]{background:#0a121c;border:2px solid #2a6a6a;border-radius:48px;padding:12px 20px;width:100%;color:#0ff;font-size:1rem;font-family:monospace;text-align:center;letter-spacing:3px;outline:none;transition:.2s;margin-bottom:12px}
input:focus{border-color:#0ff;box-shadow:0 0 18px #0ff3}
button{background:linear-gradient(95deg,#0a2a2a,#0a3a3a);border:none;border-radius:48px;padding:10px 24px;width:100%;font-size:1rem;font-weight:bold;color:#0ff;cursor:pointer;transition:.2s}
button:hover{background:linear-gradient(95deg,#0c3c3c,#0e5e5e);color:#fff;box-shadow:0 0 14px #0ff5;transform:scale(1.02)}
.erro{color:#f66;margin-top:10px;font-size:.8rem;display:none;padding:6px 12px;background:#1a0505;border-radius:10px;border:1px solid #5a1a1a}
footer{margin-top:1.5rem;font-size:.7rem;color:#2a6a6a}
.loader{display:inline-block;width:14px;height:14px;border:2px solid #0ff;border-top:2px solid transparent;border-radius:50%;animation:spin .8s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style></head>
<body><div class="container" id="loginContainer"><div class="top-bar"><div class="title">⚡ CONTEÚDO BLINDADO</div>
<div class="countdown-info"><span class="label">🕒</span><span class="value" id="countdown">--:--:--</span></div></div>
<input type="text" id="senha" placeholder="INSIRA A SENHA DO PERÍODO" autocomplete="off" maxlength="11">
<button id="btnDesbloquear">🔓 DESBLOQUEAR</button><div class="erro" id="erro"></div>
<footer>© UNIVERSO ÁUREO · 3·6·9 · Protegido via APPSCRIPT</footer></div>
<script>
// ── AUTO-RELANÇAMENTO VIA BLOB QUANDO ABERTO EM file:// ─────────────────────
// O navegador bloqueia fetch() externo de file://. A solução: ler o próprio
// HTML, criar um Blob (origem null com permissão de rede) e reabrir nele.
(function(){
  if(location.protocol==='file:'){
    var req=new XMLHttpRequest();
    req.open('GET',location.href,true);
    req.responseType='blob';
    req.onload=function(){
      var blob=new Blob([req.response],{type:'text/html'});
      var url=URL.createObjectURL(blob);
      var opened=window.open(url,'_self');
      if(!opened||opened===window){
        document.body.innerHTML='<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#030507;font-family:monospace;gap:20px">'
          +'<div style="color:#0ff;font-size:1.2rem;letter-spacing:3px">⚡ UNIVERSO ÁUREO</div>'
          +'<div style="color:#8cc;font-size:.85rem;text-align:center;max-width:380px;line-height:1.6">Para conexão segura com o servidor,<br>abra o arquivo pelo link abaixo:</div>'
          +'<a href="'+url+'" style="background:linear-gradient(95deg,#0a3a3a,#0e5e5e);color:#0ff;padding:12px 32px;border-radius:48px;text-decoration:none;font-weight:bold;font-size:1rem;letter-spacing:2px">🔓 ABRIR CONECTADO</a>'
          +'<div style="color:#2a6a6a;font-size:.65rem">© UNIVERSO ÁUREO · 3·6·9</div></div>';
      }
    };
    req.onerror=function(){/* se falhar, continua normalmente */};
    req.send();
    return;
  }
})();
// ────────────────────────────────────────────────────────────────────────────
const URL_WEB_APP="https://script.google.com/macros/s/AKfycbw-AvjiO7wVbE4jUF4rh6w9pPhqtv-7In6LIUdth1uG0zUEYGx-ZIhG2OYoUQA5BVxy_g/exec";
let _i=null,chaveMestra=null,dadosConteudo=null;
function mostrarErro(m){const e=document.getElementById("erro");e.textContent=m;e.style.display="block";setTimeout(()=>e.style.display="none",5e3);console.error(m);}
function pad(n){return String(n).padStart(2,"0");}
function fmt(ms){if(ms<=0)return"00:00:00";const s=Math.floor(ms/1e3),hh=Math.floor(s/3600),mm=Math.floor((s%3600)/60),ss=s%60;return`${pad(hh)}:${pad(mm)}:${pad(ss)}`;}
function atualizar(){const a=new Date(),ms=new Date(Date.UTC(a.getUTCFullYear(),a.getUTCMonth(),a.getUTCDate()+1))-a;document.getElementById("countdown").textContent=fmt(ms);}
async function obterChave(s){try{const r=await fetch(URL_WEB_APP+"?action=getKeyWithPassword&password="+encodeURIComponent(s));const d=await r.json();
  console.log("Resposta do backend:", d);
  if(d.ok){
      if(!d.chaveMestra) throw new Error("Chave mestra não retornada");
      let rawKey = d.chaveMestra.trim();
      let keyBytes;
      try{
          keyBytes = Uint8Array.from(atob(rawKey), c=>c.charCodeAt(0));
      }catch(e){
          throw new Error("Chave mestra não é base64 válida: "+e.message);
      }
      if(keyBytes.length !== 32) throw new Error("Tamanho da chave inválido: "+keyBytes.length+" (esperado 32)");
      chaveMestra = rawKey;
      dadosConteudo = { nonce: d.nonce, tag: d.tag, data: d.data };
      console.log("Chave mestra OK, tamanho decodificado:", keyBytes.length);
      return true;
  }
  throw new Error(d.error || "Resposta inválida do servidor");
}catch(e){mostrarErro("Erro: "+e.message);return false;}}
async function aesDecrypt(obj,keyB){const k=await crypto.subtle.importKey("raw",keyB,"AES-GCM",false,["decrypt"]);
  const n=Uint8Array.from(atob(obj.nonce),c=>c.charCodeAt(0)),t=Uint8Array.from(atob(obj.tag),c=>c.charCodeAt(0)),d=Uint8Array.from(atob(obj.data),c=>c.charCodeAt(0));
  return crypto.subtle.decrypt({name:"AES-GCM",iv:n,tagLength:128},k,new Uint8Array([...d,...t]));}
function mostrarFull(html){const t=html.trim();if(t.startsWith("<!doctype")||t.startsWith("<html")){
  const f=document.createElement("iframe");f.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999";f.srcdoc=t;
  document.body.innerHTML="";document.body.appendChild(f);document.body.style.margin="0";document.body.style.padding="0";return;}
  const d=document.createElement("div");d.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#fff;overflow:auto";
  const p=document.createElement("pre");p.textContent=t;p.style.padding="1rem";p.style.margin="0";p.style.background="#f5f5f5";d.appendChild(p);
  document.body.innerHTML="";document.body.appendChild(d);document.body.style.margin="0";document.body.style.padding="0";}
document.getElementById("btnDesbloquear").onclick=async()=>{
  const s=document.getElementById("senha").value.trim().toUpperCase();if(!s)return;
  const btn=document.getElementById("btnDesbloquear"),txt=btn.innerText;btn.innerText="🔐 VERIFICANDO";const ld=document.createElement("span");ld.className="loader";btn.appendChild(ld);
  const ok=await obterChave(s);if(ok&&chaveMestra&&dadosConteudo)try{
    const kb=Uint8Array.from(atob(chaveMestra),c=>c.charCodeAt(0));
    const buf=await aesDecrypt(dadosConteudo,kb);
    const txt=new TextDecoder().decode(buf);
    mostrarFull(txt);
  }catch(e){mostrarErro("Falha na descriptografia: "+e.message);btn.innerText=txt;if(ld.parentNode)ld.remove();}
  else{btn.innerText=txt;if(ld.parentNode)ld.remove();}};
atualizar();_i=setInterval(atualizar,1e3);document.getElementById("senha").addEventListener("keypress",e=>{if(e.key==="Enter")document.getElementById("btnDesbloquear").click();});
</script></body></html>
