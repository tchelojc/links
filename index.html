<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Soma</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--g:#FFD700;--g2:#FF8C00;--bg:#05050e;--bg2:#0b0b1a;--bg3:#111128;
  --panel:rgba(13,13,30,0.98);--bdr:rgba(255,215,0,0.2);--bdr2:rgba(255,215,0,0.45);
  --txt:#c8d4ee;--txt2:rgba(200,212,238,0.55);--red:#ff3d5a;--grn:#00ffaa;--r:12px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Rajdhani',sans-serif}
#bgCanvas{position:fixed;inset:0;z-index:0;opacity:.4}
#pgLogin{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,165,0,.08) 0%,transparent 70%),var(--bg)}
.login-box{width:min(460px,92vw);background:var(--panel);border:1px solid var(--bdr2);border-radius:20px;padding:44px 40px 40px;
  box-shadow:0 0 60px rgba(255,165,0,.08),0 24px 80px rgba(0,0,0,.7);animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
.login-logo{font-family:'Orbitron',monospace;font-size:clamp(1.3rem,3.5vw,2rem);font-weight:900;text-align:center;margin-bottom:6px;
  background:linear-gradient(90deg,#ffd700,#ff8c00,#ffd700);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite}
@keyframes shimmer{to{background-position:200% center}}
.login-sub{text-align:center;font-size:.78rem;letter-spacing:.22em;color:rgba(255,215,0,.35);text-transform:uppercase;margin-bottom:32px}
.sys-status{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:28px;font-size:.72rem;letter-spacing:.18em;
  color:rgba(255,215,0,.4);text-transform:uppercase}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--g);box-shadow:0 0 6px var(--g);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.key-input{width:100%;padding:14px 18px;background:rgba(5,5,14,.85);border:1px solid var(--bdr);border-radius:var(--r);color:#fff;
  font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:.06em;outline:none;transition:.2s border-color,.2s box-shadow;margin-bottom:14px}
.key-input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(255,215,0,.07)}
.key-input::placeholder{color:rgba(255,255,255,.18)}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--g2),var(--g));color:#05050e;border:none;
  border-radius:var(--r);font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;position:relative;overflow:hidden;transition:.25s transform,.25s box-shadow}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(255,165,0,.4)}
.btn-login::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.1) 50%,transparent 65%);
  transform:translateX(-100%);transition:.6s}
.btn-login:hover::after{transform:translateX(100%)}
.alert{padding:11px 14px;border-radius:9px;font-size:.88rem;text-align:center;margin-top:12px;display:none}
.alert-err{background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.35);color:#ff7a90}
.alert-ok{background:rgba(0,255,170,.08);border:1px solid rgba(0,255,170,.3);color:#00ffcc}
#pgMain{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;background:var(--bg2)}
.topbar{flex-shrink:0;display:flex;align-items:center;height:52px;padding:0 20px;gap:14px;background:rgba(5,5,14,.97);
  border-bottom:1px solid var(--bdr);position:relative;z-index:20}
.topbar-logo{font-family:'Orbitron',monospace;font-size:.78rem;font-weight:900;letter-spacing:.12em;
  background:linear-gradient(90deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.topbar-sep{flex:1}
.sess-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:rgba(255,215,0,.06);
  border:1px solid rgba(255,215,0,.15);font-size:.68rem;color:rgba(255,215,0,.5);font-family:'Rajdhani',sans-serif}
.sess-chip strong{color:var(--g)}
.btn-sair{padding:6px 14px;font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.1em;font-weight:700;background:transparent;
  border:1px solid rgba(255,61,90,.4);color:rgba(255,61,90,.7);border-radius:8px;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-sair:hover{border-color:var(--red);color:var(--red)}
.plat-nav{flex-shrink:0;display:flex;align-items:stretch;background:rgba(5,5,14,.95);border-bottom:1px solid var(--bdr);
  overflow-x:auto;scrollbar-width:none;padding:0 16px;gap:2px}
.plat-nav::-webkit-scrollbar{display:none}
.plat-tab{display:flex;align-items:center;gap:8px;padding:0 20px;height:44px;font-family:'Orbitron',monospace;font-size:.68rem;
  font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,215,0,.35);border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;transition:.2s all;flex-shrink:0;background:none;border-left:none;border-right:none;border-top:none}
.plat-tab:hover{color:rgba(255,215,0,.7)}
.plat-tab.ativo{color:var(--g);border-bottom-color:var(--g);background:rgba(255,215,0,.04)}
.tab-badge{background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.2);border-radius:20px;padding:1px 7px;font-size:.6rem;color:rgba(255,215,0,.5)}
.viewer-area{flex:1;overflow:hidden;position:relative}
.plat-panel{position:absolute;inset:0;display:none;flex-direction:column}
.plat-panel.ativo{display:flex}
.file-selector{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg2);gap:16px;padding:30px}
.file-selector h2{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;letter-spacing:.12em;color:var(--g);margin-bottom:8px;text-align:center}
.file-selector p{font-size:.85rem;color:var(--txt2);text-align:center;max-width:380px}
.files-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:700px}
.file-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 28px;background:rgba(13,13,30,.9);
  border:1px solid var(--bdr);border-radius:14px;cursor:pointer;transition:.25s all;min-width:130px;color:var(--txt);
  font-family:'Rajdhani',sans-serif}
.file-btn:hover{border-color:var(--g);box-shadow:0 0 20px rgba(255,215,0,.12);transform:translateY(-3px)}
.file-btn .fb-icon{font-size:2.4rem}
.file-btn .fb-name{font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;letter-spacing:.05em;color:var(--g);
  text-align:center;word-break:break-all;max-width:120px}
.file-btn .fb-size{font-size:.75rem;color:var(--txt2)}
.content-frame{position:absolute;inset:0;display:none;flex-direction:column}
.content-frame.visivel{display:flex}
.content-bar{flex-shrink:0;display:flex;align-items:center;gap:10px;height:40px;padding:0 14px;background:rgba(5,5,14,.97);
  border-bottom:1px solid var(--bdr);font-size:.72rem}
.cb-back{padding:4px 12px;font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:.1em;font-weight:700;
  background:rgba(255,215,0,.08);border:1px solid var(--bdr);color:rgba(255,215,0,.6);border-radius:7px;cursor:pointer;transition:.2s;flex-shrink:0}
.cb-back:hover{border-color:var(--g);color:var(--g)}
.cb-name{font-family:'Orbitron',monospace;font-size:.68rem;color:var(--g);letter-spacing:.08em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cb-info{color:var(--txt2);font-size:.7rem;flex-shrink:0}
.content-body{flex:1;overflow:hidden;position:relative;background:#fff}
.content-body iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}
.content-body.code-mode{background:rgba(3,3,10,.95);overflow:auto}
.content-body pre{padding:24px;font-family:'Courier New',monospace;font-size:.83rem;line-height:1.6;color:#a8c8e8;
  white-space:pre-wrap;word-break:break-all;min-height:100%}
.loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg2);z-index:5;font-family:'Orbitron',monospace;font-size:.75rem;letter-spacing:.2em;color:rgba(255,215,0,.4);gap:16px}
.spin{width:40px;height:40px;border:3px solid rgba(255,215,0,.1);border-top-color:var(--g);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.corner-tl,.corner-br{position:fixed;width:80px;height:80px;z-index:1;pointer-events:none}
.corner-tl{top:0;left:0;border-top:2px solid rgba(255,215,0,.1);border-left:2px solid rgba(255,215,0,.1)}
.corner-br{bottom:0;right:0;border-bottom:2px solid rgba(255,215,0,.1);border-right:2px solid rgba(255,215,0,.1)}
@media(max-width:500px){.login-box{padding:32px 24px}.plat-tab{padding:0 12px;font-size:.6rem}}
</style>
</head>

<script>
(function() {
    if (location.protocol === 'file:') {
        // Evita recarga infinita
        if (sessionStorage.getItem('ua_blob_launched') === 'true') {
            sessionStorage.removeItem('ua_blob_launched');
            return;
        }
        var xhr = new XMLHttpRequest();
        xhr.open('GET', location.href, true);
        xhr.responseType = 'blob';
        xhr.onload = function() {
            var blob = new Blob([xhr.response], {type: 'text/html'});
            var url = URL.createObjectURL(blob);
            sessionStorage.setItem('ua_blob_launched', 'true');
            location.replace(url);
        };
        xhr.onerror = function() {
            document.body.innerHTML = '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#030507;font-family:monospace;gap:20px">'
                + '<div style="color:#0ff;font-size:1.2rem;letter-spacing:3px">⚠️ ERRO</div>'
                + '<div style="color:#8cc;font-size:.85rem;text-align:center;max-width:380px">Não foi possível recarregar o arquivo. Use um servidor local (ex: "python -m http.server") ou ative o modo offline.</div>'
                + '</div>';
        };
        xhr.send();
        return;
    }
})();
</script>

function fecharFrame(pi){document.getElementById(`frame-${pi}`).classList.remove('visivel');document.getElementById(`sel-${pi}`).style.display='';
  const b=document.getElementById(`fbody-${pi}`);b.innerHTML=`<div class="loading-overlay" id="fload-${pi}"><div class="spin"></div>DESCRIPTOGRAFANDO…</div>`;b.className='content-body';}
async function getKey(nonceB64){if(keyCache.has(nonceB64))return keyCache.get(nonceB64);
  let kb=Uint8Array.from(atob(chaveMestra),c=>c.charCodeAt(0));
  if(kb.length!==16&&kb.length!==32){
    if(kb.length<16){const p=new Uint8Array(16);p.set(kb);kb=p;}
    else if(kb.length<32){const p=new Uint8Array(32);p.set(kb);kb=p;}
    else{kb=kb.slice(0,32);}
  }
  const k=await crypto.subtle.importKey('raw',kb,{name:'AES-GCM'},false,['decrypt']);
  keyCache.set(nonceB64,k);return k;}
async function decrypt(key, nonceB64, tagB64, dataB64){const iv=Uint8Array.from(atob(nonceB64),c=>c.charCodeAt(0));const tag=Uint8Array.from(atob(tagB64),c=>c.charCodeAt(0));const d=Uint8Array.from(atob(dataB64),c=>c.charCodeAt(0));
  const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv,tagLength:128},key,new Uint8Array([...d,...tag]));
  return new Uint8Array(dec);}
function atualizarSession(){const e=new Date(sessaoLic.expiracao).toLocaleDateString('pt-BR');
  document.getElementById('sessChips').innerHTML=`<span class="sess-chip">🔑 <strong>${sessaoChave}</strong></span><span class="sess-chip">📅 <strong>${e}</strong></span><span class="sess-chip">⚡ <strong>${sessaoLic.ativacoes.length}/${sessaoLic.max_ativacoes}</strong></span>`;
  document.getElementById('topInfo').textContent=`${PLATAFORMAS.length} plataforma(s) · ${sessaoFingerprint}`;}
function sair(){sessaoChave=null;sessaoLic=null;sessaoFingerprint=null;hide('pgMain');show('pgLogin','flex');
  document.getElementById('chaveInput').value='';hide('alertErr');hide('alertOk');keyCache.clear();}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function show(id,d='block'){document.getElementById(id).style.display=d;}
function hide(id){document.getElementById(id).style.display='none';}
function err(m){const d=document.getElementById('alertErr');d.textContent=m;d.style.display='block';}
function ok(m){const d=document.getElementById('alertOk');d.textContent=m;d.style.display='block';}
